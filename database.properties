# Database Configuration File
# University Management System
# Updated: 2024-10-01

# ==========================================
# DATABASE CONNECTION PROPERTIES
# ==========================================

# Database Driver (MySQL)
db.driver=com.mysql.cj.jdbc.Driver

# Database URL
# Format: jdbc:mysql://hostname:port/database_name?useSSL=false&serverTimezone=UTC
db.url=jdbc:mysql://localhost:3306/university_ms?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# Database Username
db.user=root

# Database Password
# IMPORTANT: Change this password for production
db.password=root@123

# ==========================================
# CONNECTION POOL SETTINGS
# ==========================================

# Initial number of connections
db.pool.size=10

# Maximum number of connections
db.pool.max.size=20

# Maximum idle time in seconds (5 minutes)
db.max.idle.time=300

# Connection timeout in milliseconds
db.connection.timeout=30000

# ==========================================
# LOGGING CONFIGURATION
# ==========================================

# Enable/Disable SQL logging
db.sql.logging.enabled=true

# Log level (DEBUG, INFO, WARN, ERROR)
log.level=INFO

# ==========================================
# APPLICATION SETTINGS
# ==========================================

# Application Title
app.title=University Management System

# Application Version
app.version=1.0.0

# Default theme (light or dark)
app.theme=light

# ==========================================
# SECURITY SETTINGS
# ==========================================

# Password Hashing Algorithm (BCrypt)
security.hash.algorithm=BCrypt

# Session timeout in minutes
security.session.timeout=30

# Maximum login attempts before lockout
security.max.login.attempts=5

# ==========================================
# FILE UPLOAD SETTINGS
# ==========================================

# Maximum file upload size in MB
upload.max.file.size=10

# Allowed file types for student photo
upload.allowed.extensions=jpg,jpeg,png,gif

# Upload directory
upload.directory=./uploads/

# ==========================================
# EMAIL CONFIGURATION (Optional for future)
# ==========================================

# SMTP Server
email.smtp.host=smtp.gmail.com
email.smtp.port=587
email.smtp.username=your-email@gmail.com
email.smtp.password=your-app-password

# Email sender
email.from=noreply@university.edu

# ==========================================
# REPORT SETTINGS
# ==========================================

# Report generation format (PDF, Excel, CSV)
report.default.format=PDF

# Report export directory
report.export.directory=./reports/

# ==========================================
# IMPORTANT NOTES
# ==========================================
# 1. NEVER commit passwords to version control
# 2. Use environment variables in production
# 3. Change 'root' and 'root@123' to secure credentials
# 4. Ensure MySQL server is running before starting application
# 5. Create database 'university_ms' before running application
# 6. Run SQL_SCHEMA.sql to create all tables
